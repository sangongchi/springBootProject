spring.application.name=ProjectBySpringBoot

server.port = 8888

# 直接指定指定运行环境
spring.profiles.active = dev
## 配合maven去设置运行环境，只做尝试，目前没发现如下做法的好处是什么
#spring.profiles.active=@spring.profiles.active@
# 配置devtools
#设置开启热部署
spring.devtools.restart.enabled=true
# 禁用 HTTP 响应缓存 (针对静态资源)
spring.web.resources.chain.cache=false
# 设置不需要重启的目录 (例如静态资源)
spring.devtools.restart.exclude=static/**,public/**
#只有当该路径下的文件改变时才重启
spring.devtools.restart.additional-paths=src/main/java


#spring-boot-starter-data-mongodb
#此处需要注意一点
# 如果指定了uri，则其他连接属性（如host、port、username、password等）将被忽略。
#spring.data.mongodb.uri=mongodb://root:123456@localhost:27017/admin?authSource=admin
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.host = localhost
spring.data.mongodb.port = 27017
#操作的数据库
spring.data.mongodb.database = admin
spring.data.mongodb.username=root
spring.data.mongodb.password=123456


