### # MyBatis-Plus 基础配置
# 指定Mapper接口的位置
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
# # 扫描实体类包
# mybatis-plus.type-aliases-package=com.example.demo.entity
# 字段名映射规则 下划线转驼峰
mybatis-plus.configuration.map-underscore-to-camel-case=true
# 配置日志实现  控制台输出
#mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
# 配置日志实现  走log
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl


# ==================== 日志配置 ====================
# 日志配置已迁移到 logback-spring.xml，此处仅保留必要的覆盖配置
# 全局日志级别：TRACE < DEBUG < INFO < WARN < ERROR < FATAL
# 可以设置为：TRACE, DEBUG, INFO, WARN, ERROR, FATAL, OFF

# ==================== SpringDoc OpenAPI (Swagger) 配置 ====================
# API 文档路径配置
# Swagger UI 访问地址：http://localhost:8888/swagger-ui.html 或 http://localhost:8888/swagger-ui/index.html
# API JSON 文档地址：http://localhost:8888/v3/api-docs
# API YAML 文档地址：http://localhost:8888/v3/api-docs.yaml


# ==================== Elasticsearch 配置 ====================
# Elasticsearch 连接地址
spring.elasticsearch.uris=http://localhost:9200
# Elasticsearch 用户名（如果启用了安全认证）
# spring.elasticsearch.username=elastic
# Elasticsearch 密码（如果启用了安全认证）
# spring.elasticsearch.password=your_password
# 连接超时时间（毫秒）
spring.elasticsearch.connection-timeout=5000
# Socket 超时时间（毫秒）
spring.elasticsearch.socket-timeout=10000
# 连接池大小
spring.elasticsearch.connections-per-route=10
# 最大连接数
spring.elasticsearch.max-connections-per-route=30
# 启用SSL证书验证（如果使用HTTPS）
# spring.elasticsearch.ssl.verification-mode=full

# ==================== Spring Data Elasticsearch 配置 ====================
# 启用Elasticsearch仓库
spring.data.elasticsearch.repositories.enabled=true
# 自动创建索引（开发环境建议开启，生产环境建议关闭）
spring.data.elasticsearch.client.reactive.endpoints=localhost:9200
# 自动创建索引（开发环境建议开启，生产环境建议关闭）
spring.elasticsearch.restclient.sniffer.enabled=false




# 启用 SpringDoc（默认已启用，可设置为 false 关闭）
springdoc.api-docs.enabled=true
# API 文档路径（默认：/v3/api-docs）
springdoc.api-docs.path=/v3/api-docs
# Swagger UI 路径（默认：/swagger-ui.html）
springdoc.swagger-ui.path=/swagger-ui.html
# 启用 Swagger UI（默认已启用）
springdoc.swagger-ui.enabled=true
# 显示操作 ID（默认：true）
springdoc.swagger-ui.display-operation-id=true
# 显示请求持续时间（默认：false）
springdoc.swagger-ui.display-request-duration=true
# 尝试超时时间（毫秒，默认：30000）
springdoc.swagger-ui.try-it-out-enabled=true
# 过滤需要显示的 API（支持正则表达式，留空显示所有）
# springdoc.swagger-ui.filter=
# 默认展开深度（默认：1）
springdoc.swagger-ui.default-models-expand-depth=1
# 默认模型展开深度（默认：1）
springdoc.swagger-ui.default-model-expand-depth=1
# 扫描的包路径（多个用逗号分隔，留空则扫描所有）
# springdoc.packages-to-scan=org.sangongchi.projectbyspringboot.controller
# 需要扫描的路径（支持 Ant 路径模式，多个用逗号分隔）
springdoc.paths-to-match=/**
# 需要排除的路径（支持 Ant 路径模式，多个用逗号分隔）
# springdoc.paths-to-exclude=/error,/actuator/**



# ==================== Actuator 配置 ====================
# 基础路径配置
management.endpoints.web.base-path=/actuator
# 暴露的端点
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env,beans,configprops,threaddump,heapdump,mappings,scheduledtasks
# 健康检查配置 启用了数据库、Redis、MongoDB的健康检查
management.health.db.enabled=true
management.health.redis.enabled=true
management.health.mongo.enabled=true
# 健康检查详情
management.endpoint.health.show-details=always

# ==================== Spring Boot Admin 配置 ====================
# Spring Boot Admin 服务器地址
spring.boot.admin.client.url=http://localhost:8888
# 客户端名称
spring.boot.admin.client.instance.name=${spring.application.name}
# 启用客户端
spring.boot.admin.client.enabled=true
# 注册时使用的服务URL
spring.boot.admin.client.instance.service-base-url=http://localhost:8888


# 信息端点配置
info.app.name=${spring.application.name}
info.app.version=0.0.1-SNAPSHOT
info.app.description=ProjectBySpringBoot
#info.app.version=@project.version@
#info.app.description=@project.description@
info.java.version=${java.version}
info.spring-boot.version=${spring.boot.version}

